---
- name: Install Apache
  apt:
    name: apache2
    state: present
    update_cache: yes

- name: Start Apache Service
  service:
    name: apache2
    state: started
    enabled: yes

- name: Copy index.html file
  copy:
    src: files/index.html
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: '0644'



# tasks file for apache
